<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Order | Gill Agro Industries</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .order-container {
            background: #0b0b0b;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            border-radius: 18px;
            position: relative;
            box-shadow: 0 0 25px rgba(0, 255, 100, 0.6);
        }

        .order-container::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 20px;
            background: linear-gradient(90deg, #00ff66, #00cc44, #00ff66);
            z-index: -1;
            filter: blur(8px);
        }

        h1 {
            text-align: center;
            color: #00ff66;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #ccc;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: #00ff66;
            font-size: 1rem;
            transition: box-shadow 0.3s, border 0.3s;
        }

        input::placeholder, textarea::placeholder {
            color: #555;
        }

        input:focus, textarea:focus {
            border-color: #00ff66;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.8);
            outline: none;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00ff66, #00cc44);
            border: none;
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.9);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="order-container">
        <h1>Place Your Order</h1>
        <p>Premium sickles by Gill Agro Industries</p>

        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="address">Delivery Address</label>
            <textarea id="address" name="address" rows="4" placeholder="Enter delivery address" required></textarea>

            <label for="type">Type of Sickle</label>
            <select id="type" name="type" required style="width:100%;padding:12px;margin-bottom:20px;border-radius:8px;border:1px solid #333;background:#000;color:#00ff66;font-size:1rem;">
                <option value="">Select sickle type</option>
                <option>Wood Handle Sickle</option>
                <option>Plastic Handle Sickle</option>
                <option>Heavy Duty Sickle</option>
            </select>

            <label for="bags">Number of Bags</label>
            <input type="number" id="bags" name="bags" min="1" placeholder="Enter number of bags" required>

            <button type="submit">Confirm Order</button>
        </form>

        <div class="footer-text">© 2026 Gill Agro Industries</div>
    </div>

</body>
</html>
